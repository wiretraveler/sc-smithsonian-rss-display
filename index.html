<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Headlines</title>
  <style>
    :root {
      --bg: #111214;
      --text: #f4f6f8;
      --muted: #adb5bf;
      --accent: #f0c84b;
      --line: rgba(255,255,255,0.08);
      --ok: #38d39f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(180deg, #16181b 0%, #101113 100%);
    }

    .board {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      overflow: hidden;
      background: linear-gradient(135deg, #1c1f23 0%, #111214 62%, #191d21 100%);
    }

    .media {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #2b2f34 0%, #17191c 100%);
    }

    .media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 700ms ease, transform 30s linear;
    }

    .media img.active {
      opacity: 1;
      transform: scale(1);
    }

    .media-fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background:
        radial-gradient(circle at 25% 20%, rgba(240,200,75,0.10), transparent 18%),
        linear-gradient(135deg, #2a2d31 0%, #1b1d20 100%);
      color: rgba(255,255,255,0.15);
      font-size: 96px;
      font-weight: 900;
    }

    .media-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.00) 44%, rgba(0,0,0,0.18) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.04), rgba(0,0,0,0.18));
    }

    .panel {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(22px, 2.2vh, 34px) clamp(24px, 2vw, 38px) clamp(18px, 2vh, 28px);
      background: linear-gradient(180deg, #23272c 0%, #1a1d21 100%);
      border-left: 1px solid rgba(255,255,255,0.06);
    }

    .panel::before {
      content: "SCIENCE";
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: clamp(110px, 11vw, 160px);
      font-weight: 900;
      color: rgba(255,255,255,0.035);
    }

    .title {
      font-size: clamp(18px, 1.1vw, 22px);
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .story-wrap {
      display: grid;
      align-content: center;
      padding: 1vh 0;
    }

    .headline {
      margin: 0 0 18px;
      font-size: clamp(40px, 3.5vw, 62px);
      line-height: 1.02;
      font-weight: 900;
    }

    .summary {
      font-size: clamp(19px, 1.35vw, 26px);
      line-height: 1.32;
      color: #d8dde4;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 94%;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: clamp(14px, 0.9vw, 16px);
      font-weight: 900;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .meta-left::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ok);
    }

    .dots {
      display: flex;
      gap: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }

    .loading, .error {
      display: grid;
      place-items: center;
      height: 100%;
      font-size: 24px;
      font-weight: 700;
    }

    .error { color: #ffd3b3; }

    @media (max-width: 1600px), (max-height: 950px) {
      .board { grid-template-columns: 1.42fr 1fr; }
      .headline { font-size: clamp(34px, 3.1vw, 54px); }
      .summary { font-size: clamp(18px, 1.25vw, 23px); }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="media" id="mediaPanel">
      <div class="media-fallback" id="mediaFallback">SCIENCE</div>
      <div class="media-overlay"></div>
    </section>

    <aside class="panel">
      <div class="title">Smithsonian Headlines</div>

      <div class="story-wrap" id="storyWrap">
        <div class="loading">Loading science headlines…</div>
      </div>

      <div class="footer">
        <div class="meta-left" id="metaTime">Live</div>
        <div class="dots" id="dots"></div>
        <div id="sourceText">Source: Smithsonian</div>
      </div>
    </aside>
  </main>

  <script>
    const DATA_URL = "./data/stories.json";
    const ROTATE_MS = 18000;
    const REFRESH_MS = 5 * 60 * 1000;

    const mediaPanel = document.getElementById("mediaPanel");
    const mediaFallback = document.getElementById("mediaFallback");
    const storyWrap = document.getElementById("storyWrap");
    const dotsEl = document.getElementById("dots");
    const metaTimeEl = document.getElementById("metaTime");
    const sourceTextEl = document.getElementById("sourceText");

    let stories = [];
    let currentIndex = 0;

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function relativeTime(dateString) {
      const diff = Date.now() - new Date(dateString).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 60) return `${m} min ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h} hours ago`;
      return `${Math.floor(h / 24)} days ago`;
    }

    function showStory(i) {
      const s = stories[i];
      storyWrap.innerHTML = `
        <h1 class="headline">${escapeHtml(s.title)}</h1>
        <div class="summary">${escapeHtml(s.summary)}</div>
      `;
      metaTimeEl.textContent = relativeTime(s.pubDateIso);
    }

    async function loadFeed() {
      try {
        const res = await fetch(`${DATA_URL}?t=${Date.now()}`);
        const data = await res.json();
        stories = data.stories;
        showStory(0);
      } catch {
        storyWrap.innerHTML = `<div class="error">Failed to load headlines</div>`;
      }
    }

    loadFeed();
  </script>
</body>
</html>
