<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Headlines</title>
  <style>
    :root {
      --bg: #111214;
      --bg2: #181a1d;
      --panel: #202327;
      --panel2: #262a2f;
      --text: #f4f6f8;
      --muted: #adb5bf;
      --accent: #f0c84b;
      --line: rgba(255,255,255,0.08);
      --ok: #38d39f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(180deg, #16181b 0%, #101113 100%);
    }

    .board {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1.62fr 1fr;
      overflow: hidden;
      background: linear-gradient(135deg, #1c1f23 0%, #111214 62%, #191d21 100%);
    }

    .media {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #2b2f34 0%, #17191c 100%);
    }

    .media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 700ms ease, transform 30s linear;
    }

    .media img.active {
      opacity: 1;
      transform: scale(1);
    }

    .media-fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background:
        radial-gradient(circle at 25% 20%, rgba(240,200,75,0.10), transparent 18%),
        linear-gradient(135deg, #2a2d31 0%, #1b1d20 100%);
      color: rgba(255,255,255,0.15);
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .media-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.00) 44%, rgba(0,0,0,0.18) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.04), rgba(0,0,0,0.18));
    }

    .panel {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 34px 38px 28px;
      background: linear-gradient(180deg, #23272c 0%, #1a1d21 100%);
      border-left: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .panel::before {
      content: "SCIENCE";
      position: absolute;
      right: -18px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 160px;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .updated {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px 0 0 14px;
      background: linear-gradient(90deg, #f3cf57, #efbd1c);
      color: #171717;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .updated-dot {
      width: 14px;
      height: 14px;
      border: 3px solid currentColor;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
    }

    .updated-dot::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 4px;
      background: currentColor;
      left: 50%;
      top: 1px;
      transform: translateX(-50%);
    }

    .updated-dot::before {
      content: "";
      position: absolute;
      width: 4px;
      height: 2px;
      background: currentColor;
      right: 1px;
      top: 50%;
      transform: translateY(-50%);
    }

    .story-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: center;
      min-height: 0;
    }

    .story {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 450ms ease, transform 450ms ease;
    }

    .story.active {
      opacity: 1;
      transform: translateY(0);
    }

    .headline {
      margin: 0 0 22px;
      font-size: clamp(48px, 4.2vw, 70px);
      line-height: 1.03;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-wrap: balance;
    }

    .summary {
      font-size: clamp(22px, 1.7vw, 29px);
      line-height: 1.35;
      color: #d8dde4;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 96%;
    }

    .footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta-left {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .meta-left::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(56,211,159,0.14);
    }

    .dots {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      transition: transform 250ms ease, background 250ms ease;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }

    .loading,
    .error {
      display: grid;
      place-items: center;
      height: 100%;
      padding: 40px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    .error {
      color: #ffd3b3;
    }

    @media (max-width: 1100px) {
      .board { grid-template-columns: 1.35fr 1fr; }
      .panel { padding: 28px 28px 22px; }
      .headline { font-size: clamp(36px, 4vw, 56px); }
      .summary { font-size: clamp(18px, 1.5vw, 24px); }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="media" id="mediaPanel">
      <div class="media-fallback" id="mediaFallback">SCIENCE</div>
      <div class="media-overlay"></div>
    </section>

    <aside class="panel">
      <div class="header">
        <div class="title">Smithsonian Headlines</div>
      </div>

      <div class="story-wrap" id="storyWrap">
        <div class="loading">Loading science headlines…</div>
      </div>

      <div class="footer">
        <div class="meta-left" id="metaTime">Live</div>
        <div class="dots" id="dots"></div>
        <div id="sourceText">Source: Smithsonian</div>
      </div>
    </aside>
  </main>

  <script>
    const DATA_URL = "./data/stories.json";
    const ROTATE_MS = 18000;
    const REFRESH_MS = 5 * 60 * 1000;

    const mediaPanel = document.getElementById("mediaPanel");
    const mediaFallback = document.getElementById("mediaFallback");
    const storyWrap = document.getElementById("storyWrap");
    const dotsEl = document.getElementById("dots");
    const metaTimeEl = document.getElementById("metaTime");
    const sourceTextEl = document.getElementById("sourceText");

    let stories = [];
    let currentIndex = 0;
    let rotateTimer = null;

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function relativeTime(dateString) {
      const then = new Date(dateString).getTime();
      if (Number.isNaN(then)) return "Recently";

      const diffMs = Date.now() - then;
      const minutes = Math.max(1, Math.floor(diffMs / 60000));

      if (minutes < 60) return `${minutes} min ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours} hour${hours === 1 ? "" : "s"} ago`;
      const days = Math.floor(hours / 24);
      return `${days} day${days === 1 ? "" : "s"} ago`;
    }

    function preloadImages(items) {
      mediaPanel.querySelectorAll("img").forEach((img) => img.remove());

      items.forEach((item, index) => {
        if (!item.image) return;
        const img = document.createElement("img");
        img.src = item.image;
        img.alt = item.title || "";
        img.loading = index === 0 ? "eager" : "lazy";
        mediaPanel.appendChild(img);
      });
    }

    function renderDots() {
      dotsEl.innerHTML = "";
      stories.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = `dot${index === currentIndex ? " active" : ""}`;
        dotsEl.appendChild(dot);
      });
    }

    function showStory(index) {
      if (!stories.length) return;

      currentIndex = index % stories.length;
      const story = stories[currentIndex];

      const images = Array.from(mediaPanel.querySelectorAll("img"));
      images.forEach((img, idx) => {
        img.classList.toggle("active", idx === currentIndex);
      });

      mediaFallback.style.display = story.image ? "none" : "grid";

      storyWrap.innerHTML = `
        <article class="story active">
          <h1 class="headline">${escapeHtml(story.title)}</h1>
          <div class="summary">${escapeHtml(story.summary || "")}</div>
        </article>
      `;

      metaTimeEl.textContent = relativeTime(story.pubDateIso || story.pubDate);
      sourceTextEl.textContent = `Source: ${story.source || "ESPN"}`;

      renderDots();
    }

    function startRotation() {
      clearInterval(rotateTimer);
      if (stories.length <= 1) return;

      rotateTimer = setInterval(() => {
        showStory((currentIndex + 1) % stories.length);
      }, ROTATE_MS);
    }

    async function loadFeed() {
      try {
        const res = await fetch(`${DATA_URL}?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!data.stories || !Array.isArray(data.stories) || !data.stories.length) {
          throw new Error("No stories returned");
        }

        stories = data.stories.filter(s => s.title && s.link);

        if (!stories.length) {
          throw new Error("No usable stories returned");
        }

        preloadImages(stories);
        showStory(0);
        startRotation();
      } catch (err) {
        console.error(err);
        mediaFallback.style.display = "grid";
        storyWrap.innerHTML = `<div class="error">Could not load science headlines.</div>`;
        dotsEl.innerHTML = "";
        metaTimeEl.textContent = "Unavailable";
        sourceTextEl.textContent = "Source unavailable";
      }
    }

    loadFeed();
    setInterval(loadFeed, REFRESH_MS);
  </script>
</body>
</html>
